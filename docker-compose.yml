version: '3.8'

services:
  postgres:
    image: postgres:16
    container_name: ig-farm-db
    environment:
      POSTGRES_USER: ig_farm
      POSTGRES_PASSWORD: ig_farm_dev
      POSTGRES_DB: ig_farm
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ig_farm"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: ./apps/api
    container_name: ig-farm-api
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://ig_farm:ig_farm_dev@postgres:5432/ig_farm
    volumes:
      - ./apps/api:/app
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
